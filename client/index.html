<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether P2P File Transfer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="settings-btn" title="Settings">⚙️</div>
    
    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="setting-item">
                <label>Verbose Mode (Technical Logs)</label>
                <input type="checkbox" id="verbose-toggle">
            </div>
            <button id="close-settings">Close</button>
        </div>
    </div>

    <div id="snackbar-container"></div>

    <div class="container">
        <h1>Aether P2P</h1>
        
        <div id="setup-section">
            <div class="card">
                <h2>Create a Room</h2>
                <button id="create-room-btn">Create Room</button>
                <p id="room-display" class="hidden">Your Room Code: <span id="room-id"></span></p>
            </div>
            <div class="card">
                <h2>Join a Room</h2>
                <input type="text" id="join-room-input" placeholder="Enter Room Code">
                <button id="join-room-btn">Join Room</button>
            </div>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p id="loader-text">Processing...</p>
        </div>

        <div id="transfer-section" class="hidden">
            <div class="status-bar">
                <span id="role-badge" class="badge">Connecting...</span>
                Status: <span id="status">Connecting...</span>
            </div>
            <div class="drop-zone" id="drop-zone">
                <div class="drop-zone-content">
                    <div class="upload-icon">📁</div>
                    <p id="drop-zone-text">Drag & Drop file here or <span>browse</span></p>
                </div>
                <input type="file" id="file-input" hidden>
            </div>
            <div id="progress-container" class="hidden">
                <div class="file-info">
                    <span id="file-name">Filename.ext</span>
                    <span id="file-size">0 MB / 0 MB</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <p id="progress-text">0%</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
